<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/favicon.jpg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Masters Luxury Lounge — premium pool & billiards experience at Al Salam Mall, Salmiya, Kuwait. Open 24 hours. Book your table now." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <title>Masters Luxury Lounge | Salmiya, Kuwait</title>
  </head>
  <body>
    <script>
      window.__appBootAt = performance.now()
    </script>
    <style>
      #preloader {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 28px;
        background:
          radial-gradient(ellipse at top, rgba(138, 106, 48, 0.35), transparent 60%),
          radial-gradient(ellipse at bottom, rgba(201, 164, 103, 0.12), transparent 55%),
          #060503;
        transition: opacity 0.6s ease, visibility 0.6s ease;
      }
      #preloader.preloader--hide {
        opacity: 0;
        visibility: hidden;
      }
      .preloader__ring {
        position: relative;
        width: 116px;
        height: 116px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .preloader__ring::before {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid rgba(201, 164, 103, 0.18);
      }
      .preloader__ring::after {
        content: '';
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 2px solid transparent;
        border-top-color: #c9a467;
        border-right-color: #f0e4b8;
        animation: preloader-spin 1s linear infinite;
      }
      .preloader__logo {
        width: 72px;
        height: 72px;
        border-radius: 14px;
        object-fit: cover;
        animation: preloader-pulse 2.2s ease-in-out infinite;
      }
      .preloader__title {
        font-family: 'Playfair Display', Georgia, serif;
        letter-spacing: 0.42em;
        font-size: 20px;
        font-weight: 700;
        text-indent: 0.42em;
        background: linear-gradient(135deg, #f0e4b8, #c9a467 60%, #8a6d2c);
        -webkit-background-clip: text;
        background-clip: text;
        color: transparent;
      }
      .preloader__sub {
        font-family: Inter, system-ui, sans-serif;
        letter-spacing: 0.34em;
        font-size: 10px;
        text-transform: uppercase;
        color: #a89a7d;
        margin-top: 10px;
        text-indent: 0.34em;
      }
      @keyframes preloader-spin {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes preloader-pulse {
        0%, 100% {
          transform: scale(1);
          box-shadow: 0 0 0 rgba(201, 164, 103, 0);
        }
        50% {
          transform: scale(1.06);
          box-shadow: 0 0 28px rgba(201, 164, 103, 0.35);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .preloader__ring::after,
        .preloader__logo {
          animation: none;
        }
      }
    </style>
    <div id="preloader">
      <div class="preloader__ring">
        <img class="preloader__logo" src="/favicon.jpg" alt="Masters" />
      </div>
      <div style="text-align: center">
        <div class="preloader__title">MASTERS</div>
        <div class="preloader__sub">Luxury Lounge</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
